name: cpp-ci

on:
  push:
  pull_request:

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y ninja-build g++ libboost-dev

      - name: Configure
        run: cmake --preset linux-debug

      - name: Build
        run: cmake --build --preset linux-debug

      - name: Test
        run: ctest --preset linux-debug --output-on-failure

  windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build/windows-ci -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" -DVCPKG_MANIFEST_MODE=ON

      - name: Build
        run: cmake --build build/windows-ci --config Debug

      - name: Test
        run: ctest --test-dir build/windows-ci -C Debug --output-on-failure
